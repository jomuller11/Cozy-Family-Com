<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#1e1a2e"/>
      <stop offset="100%" stop-color="#2e1f3e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <circle cx="92"  cy="96"  r="22" fill="#c9b6e0" opacity="0.60"/>
  <circle cx="430" cy="78"  r="14" fill="#f4b89a" opacity="0.65"/>
  <circle cx="74"  cy="426" r="16" fill="#ffd58a" opacity="0.55"/>
  <circle cx="440" cy="418" r="26" fill="#d97090" opacity="0.38"/>

  <!-- Shadow de Nubi -->
  <ellipse cx="256" cy="430" rx="108" ry="14" fill="#ffffff" opacity="0.06"/>

  <!-- Cloud bumps -->
  <ellipse cx="188" cy="172" rx="38"  ry="30"  fill="#9ed3ee"/>
  <ellipse cx="275" cy="150" rx="49"  ry="42"  fill="#9ed3ee"/>
  <ellipse cx="362" cy="180" rx="34"  ry="27"  fill="#9ed3ee"/>

  <!-- Body -->
  <ellipse cx="256" cy="286" rx="122" ry="114" fill="#9ed3ee"/>

  <!-- Belly -->
  <ellipse cx="256" cy="324" rx="76"  ry="61"  fill="#c8e8f5"/>

  <!-- Cheeks -->
  <circle cx="188" cy="294" r="19" fill="#f4b6b6" opacity="0.85"/>
  <circle cx="324" cy="294" r="19" fill="#f4b6b6" opacity="0.85"/>

  <!-- Eyes -->
  <ellipse cx="218" cy="256" rx="10" ry="12" fill="#2b1d14"/>
  <ellipse cx="294" cy="256" rx="10" ry="12" fill="#2b1d14"/>

  <!-- Eye shines -->
  <circle cx="222" cy="251" r="3.5" fill="#fff"/>
  <circle cx="298" cy="251" r="3.5" fill="#fff"/>

  <!-- Smile -->
  <path d="M 237 308 Q 256 324 275 308"
        stroke="#3a2a1f" stroke-width="6.5" fill="none" stroke-linecap="round"/>

  <!-- Heart accent -->
  <g transform="translate(370,88)">
    <path d="M 22 34 C 22 34 2 22 2 11 A 11 11 0 0 1 22 7 A 11 11 0 0 1 42 11 C 42 22 22 34 22 34 Z"
          fill="#d97090" opacity="0.95"/>
  </g>

  <!-- Estrella lavender -->
  <g transform="translate(98,388) scale(0.9)">
    <path d="M 14 0 L 17 10 L 28 10 L 19 16 L 22 27 L 14 21 L 6 27 L 9 16 L 0 10 L 11 10 Z"
          fill="#c9b6e0" opacity="0.85"/>
  </g>
</svg>
