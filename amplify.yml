version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install --no-fund --no-audit
        - echo "$AMPLIFY_OUTPUTS" | base64 -d > amplify_outputs.json
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
